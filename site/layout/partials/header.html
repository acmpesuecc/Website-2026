{{define "header"}}
<!-- If the template for a particular url does not exist(posts.html), setting it to the specific page template data -->
{{ $PageData := index .DeepDataMerge.Templates .PageURL }} {{if eq $PageData nil
}} {{ $PageData = .TemplateData }} {{end}}

<header class="site-header">
    <div class="header-inner" style="display:flex; align-items:center; padding:1rem 2rem; overflow-x:hidden;">

        <div class="brand" style="flex-shrink:0; margin-right:2rem;">
            <a href="/" aria-label="{{ .DeepDataMerge.LayoutConfig.SiteTitle }}">
                <img src="/static/images/acm.png"
                     alt="{{ .DeepDataMerge.LayoutConfig.SiteTitle }}"
                     class="brand-logo" />
            </a>
        </div>

        <nav id="mobile-nav"
             class="site-nav"
             aria-label="Main navigation"
             style="display:flex; flex-direction:row; gap:1.2rem; align-items:center; flex:1; justify-content:center; overflow-x:hidden;">

            {{range $index_no, $map := .DeepDataMerge.LayoutConfig.Navbar}}
            {{range $key, $value := $map}}
            <a class="navitem" href="/{{ $value }}" style="white-space:nowrap;">{{ $key }}</a>
            {{end}}
            {{end}}

        </nav>

    </div>
</header>

{{end}}

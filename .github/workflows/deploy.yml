name: Deploy Anna Site to dev

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout site repo
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Clone anna source
        run: git clone --depth=1 https://github.com/anna-ssg/anna.git /tmp/anna

      - name: Add gm-alert-callouts and patch parser.go
        working-directory: /tmp/anna
        run: |
          go get github.com/zmtcreative/gm-alert-callouts@latest

          python3 << 'PYEOF'
          with open("pkg/parser/parser.go", "r") as f:
              src = f.read()

          # 1. Add import alongside goldmark-figure
          src = src.replace(
              'figure "github.com/mangoumbrella/goldmark-figure"',
              'figure "github.com/mangoumbrella/goldmark-figure"\n\talertcallouts "github.com/zmtcreative/gm-alert-callouts"'
          )

          # 2. Inject into TOC branch (contains &toc.Extender)
          src = src.replace(
              "\t\t\tgoldmark.WithExtensions(\n\t\t\t\textension.TaskList,\n\t\t\t\tfigure.Figure,\n\t\t\t\t&toc.Extender{",
              "\t\t\tgoldmark.WithExtensions(\n\t\t\t\textension.TaskList,\n\t\t\t\tfigure.Figure,\n\t\t\t\talertcallouts.AlertCallouts,\n\t\t\t\t&toc.Extender{"
          )

          # 3. Inject into non-TOC branch
          src = src.replace(
              "\t\t\tgoldmark.WithExtensions(\n\t\t\t\textension.TaskList,\n\t\t\t\tfigure.Figure,\n\t\t\t)",
              "\t\t\tgoldmark.WithExtensions(\n\t\t\t\textension.TaskList,\n\t\t\t\tfigure.Figure,\n\t\t\t\talertcallouts.AlertCallouts,\n\t\t\t)"
          )

          with open("pkg/parser/parser.go", "w") as f:
              f.write(src)

          print("Patch applied. Verifying...")
          with open("pkg/parser/parser.go", "r") as f:
              patched = f.read()
          count = patched.count("alertcallouts")
          print(f"Found {count} occurrences of 'alertcallouts' (expected 3: import + 2 usages)")
          assert count == 3, f"Patch failed: found {count} occurrences"
          PYEOF

      - name: Build patched anna binary
        working-directory: /tmp/anna
        run: |
          go mod tidy
          go build -o /usr/local/bin/anna .

      - name: Build Site
        run: anna

      - name: Prepare dev directory for Pages
        run: |
          mkdir -p public
          cp -r site/rendered/* public/
          REPO_NAME="${{ github.event.repository.name }}"
          find public -type f \( -name "*.html" -o -name "*.css" -o -name "*.xml" -o -name "*.js" \) -exec sed -i "s|href=\"/|href=\"/$REPO_NAME/|g" {} +
          find public -type f \( -name "*.html" -o -name "*.css" -o -name "*.xml" -o -name "*.js" \) -exec sed -i "s|src=\"/|src=\"/$REPO_NAME/|g" {} +
          find public -type f \( -name "*.html" -o -name "*.css" -o -name "*.xml" -o -name "*.js" \) -exec sed -i "s|url(/|url(/$REPO_NAME/|g" {} +
          find public -type f -name "*.html" -exec sed -i "s|fetch('/|fetch('/$REPO_NAME/|g" {} +
          find public -type f -name "*.html" -exec sed -i "s|a.href = '/|a.href = '/$REPO_NAME/|g" {} +

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
